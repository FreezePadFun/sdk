<!DOCTYPE html>
<html>
<head>
  <title>FreezePad</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>❄️ FreezePad</h1>
<p>Ship code. Lock tokens. Prove it on-chain.</p>

<button id="connectWallet">
Connect Wallet
</button>

<div class="lock-box">

<input id="tokenAddress" placeholder="Token Address">

<input id="amount" placeholder="Amount">

<input id="duration" placeholder="Lock Duration (days)">

<button id="lockBtn">
Lock Tokens
</button>

</div>

<script src="app.js"></script>

</body>
</html>
